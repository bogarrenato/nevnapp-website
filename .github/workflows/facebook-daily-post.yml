name: Daily Facebook nameday post

on:
  schedule:
    # GitHub cron runs in UTC. Cover both Budapest offsets, then guard below
    # so the post is published once at 06:00 Europe/Budapest year-round.
    - cron: '0 4 * * *'
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    concurrency:
      group: daily-facebook-nameday-post
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Post today's nameday to Facebook
        env:
          PUBLIC_SITE_URL: https://nevnap.app
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            budapest_offset="$(TZ=Europe/Budapest date +%z)"
            schedule="${{ github.event.schedule }}"
            if { [ "$budapest_offset" = "+0200" ] && [ "$schedule" != "0 4 * * *" ]; } || { [ "$budapest_offset" = "+0100" ] && [ "$schedule" != "0 5 * * *" ]; }; then
              echo "Skipping duplicate offset schedule: schedule=$schedule, Budapest offset=$budapest_offset."
              exit 0
            fi
          fi
          if [ -z "$FB_PAGE_ID" ] || [ -z "$FB_PAGE_ACCESS_TOKEN" ]; then
            echo "Facebook secrets are not configured yet; skipping post."
            exit 0
          fi
          npm run facebook:post
