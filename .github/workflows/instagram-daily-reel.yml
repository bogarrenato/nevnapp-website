name: Daily Instagram nameday Reel

on:
  schedule:
    # GitHub cron runs in UTC. Cover both Budapest offsets, then guard below
    # so the Reel is published once at 06:05 Europe/Budapest year-round.
    - cron: '5 4 * * *'
    - cron: '5 5 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    concurrency:
      group: daily-instagram-nameday-reel
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Post today's nameday Reel to Instagram
        env:
          PUBLIC_SITE_URL: https://www.nevnap.app
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            budapest_offset="$(TZ=Europe/Budapest date +%z)"
            schedule="${{ github.event.schedule }}"
            if { [ "$budapest_offset" = "+0200" ] && [ "$schedule" != "5 4 * * *" ]; } || { [ "$budapest_offset" = "+0100" ] && [ "$schedule" != "5 5 * * *" ]; }; then
              echo "Skipping duplicate offset schedule: schedule=$schedule, Budapest offset=$budapest_offset."
              exit 0
            fi
          fi
          if [ -z "$IG_USER_ID" ] || [ -z "$IG_ACCESS_TOKEN" ]; then
            echo "Instagram secrets are not configured yet; skipping Reel post."
            exit 0
          fi
          npm run instagram:reel
