name: Daily Instagram nameday Reel

on:
  schedule:
    # GitHub cron runs in UTC. Cover both Budapest offsets, then guard below
    # so the Reel is published once at 06:05 Europe/Budapest year-round.
    - cron: '5 4 * * *'
    - cron: '5 5 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    concurrency:
      group: daily-instagram-nameday-reel
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Post today's nameday Reel to Instagram
        env:
          PUBLIC_SITE_URL: https://www.nevnap.app
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          budapest_time="$(TZ=Europe/Budapest date +%H:%M)"
          if [ "${{ github.event_name }}" = "schedule" ] && { [[ "$budapest_time" < "06:05" ]] || [[ "$budapest_time" > "06:59" ]]; }; then
            echo "Skipping: current Budapest time is $budapest_time, outside the 06:05-06:59 posting window."
            exit 0
          fi
          if [ -z "$IG_USER_ID" ] || [ -z "$IG_ACCESS_TOKEN" ]; then
            echo "Instagram secrets are not configured yet; skipping Reel post."
            exit 0
          fi
          npm run instagram:reel
